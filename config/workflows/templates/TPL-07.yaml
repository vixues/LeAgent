id: TPL-07
name: 脚本串联示例
description: 第一个脚本生成结构，第二个脚本读取并附加标记，演示节点间变量传递。
inputs:
- name: run_label
  type: string
  description: 串联演示的标签（写入第一步输出）
  required: false
  default: chain-demo
outputs:
- name: second
  type: object
  description: 第二步输出
  value: ${second}
metadata:
  category: data
  original_category: data
nodes:
  start:
    class_type: StartNode
    inputs: {}
    meta:
      name: ''
      description: ''
    control:
      next: step_one
  step_one:
    class_type: ScriptNode
    inputs:
      timeout_sec: 2.0
      output: first
      source: 'result = {"step": 1, "items": ["a", "b", "c"], "label": run_label}

        print("step_one_done")

        '
      inputs:
        run_label: ${input.run_label}
    meta:
      name: 第一步
      description: ''
    control:
      next: step_two
  step_two:
    class_type: ScriptNode
    inputs:
      timeout_sec: 2.0
      output: second
      source: 'prev = first if isinstance(first, dict) else {}

        result = {"step": 2, "received": prev, "ready": True}

        print("step_two_done")

        '
      inputs:
        first: ${first}
    meta:
      name: 第二步
      description: ''
    control:
      next: end
  end:
    class_type: EndNode
    inputs: {}
    meta:
      name: ''
      description: ''
      end_output:
        second: ${second}
    control: {}
control:
  start: start
  end: end
  edges: []
  timeout_sec: 3600
  max_retries: 3
  tags:
  - data
