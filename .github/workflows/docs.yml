name: Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'scripts/install.sh'
      - 'scripts/install.ps1'
      - 'scripts/install.bat'
      - '.github/workflows/docs.yml'

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      - name: Install dependencies
        run: |
          pip install mkdocs mkdocs-material mkdocstrings[python] mkdocs-git-revision-date-localized-plugin
      
      - name: Build documentation
        run: mkdocs build
      
      - name: Publish install scripts to site root (curl | bash / irm | iex)
        run: |
          cp -f scripts/install.sh scripts/install.ps1 scripts/install.bat site/
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/
