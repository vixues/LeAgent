name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. Create the GitHub Release page immediately
  #    Downstream jobs append artifacts to this same release.
  # ─────────────────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.content }}
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true
          files: |
            scripts/install.sh
            scripts/install.ps1
            scripts/install.bat

  # ─────────────────────────────────────────────────────────────
  # 2a. Desktop installer — Linux (AppImage + .deb, x64)
  # ─────────────────────────────────────────────────────────────
  desktop-linux:
    name: Desktop Installer (Linux)
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/electron/package-lock.json

      - name: Install Linux packaging deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends dpkg fakeroot bc

      - name: Build Linux installers
        run: bash desktop/scripts/build-linux.sh --version "${{ needs.create-release.outputs.version }}"

      - name: Upload artifacts (CI)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: desktop-linux
          path: |
            desktop/electron/dist-pack/*.AppImage
            desktop/electron/dist-pack/*.deb
          if-no-files-found: warn

      - name: Attach installers to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: |
            desktop/electron/dist-pack/*.AppImage
            desktop/electron/dist-pack/*.deb
          fail_on_unmatched_files: false

  # ─────────────────────────────────────────────────────────────
  # 2b. Desktop installer — macOS (arm64 + x64, .dmg + .zip)
  # ─────────────────────────────────────────────────────────────
  desktop-macos:
    name: Desktop Installer (macOS)
    runs-on: macos-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/electron/package-lock.json

      - name: Build macOS installers
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bash desktop/scripts/build-mac.sh --version "${{ needs.create-release.outputs.version }}"

      - name: Upload artifacts (CI)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: desktop-macos
          path: |
            desktop/electron/dist-pack/*.dmg
            desktop/electron/dist-pack/*.zip
          if-no-files-found: warn

      - name: Attach installers to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: |
            desktop/electron/dist-pack/*.dmg
            desktop/electron/dist-pack/*.zip
          fail_on_unmatched_files: false

  # ─────────────────────────────────────────────────────────────
  # 2c. Desktop installer — Windows (NSIS .exe, x64)
  # ─────────────────────────────────────────────────────────────
  desktop-windows:
    name: Desktop Installer (Windows)
    runs-on: windows-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/electron/package-lock.json

      - name: Build Windows installer
        shell: pwsh
        run: |
          .\desktop\scripts\build-win.ps1 -Version "${{ needs.create-release.outputs.version }}"

      - name: Upload artifacts (CI)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: desktop-windows
          path: |
            desktop/electron/dist-pack/*.exe
            desktop/electron/dist-pack/*.exe.blockmap
          if-no-files-found: warn

      - name: Attach installer to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: |
            desktop/electron/dist-pack/*.exe
            desktop/electron/dist-pack/*.exe.blockmap
          fail_on_unmatched_files: false

  # ─────────────────────────────────────────────────────────────
  # 3. Optional: publish backend wheel to PyPI when enabled
  # ─────────────────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: create-release
    if: ${{ vars.PYPI_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: uv build
        working-directory: backend

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: uvx twine upload dist/*
        working-directory: backend
