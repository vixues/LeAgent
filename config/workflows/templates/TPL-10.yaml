id: TPL-10
name: 日期加法示例
description: 使用 date_calculator 将固定日期加上若干天，输出格式化结果。
inputs:
- name: base_date
  type: string
  description: 起始日期（YYYY-MM-DD）
  required: false
  default: '2026-04-01'
- name: days
  type: integer
  description: 要增加的天数（可为负）
  required: false
  default: 7
outputs:
- name: shifted
  type: object
  description: date_calculator 的输出（含格式化后的日期字符串等）
  value: ${shifted}
metadata:
  category: productivity
  original_category: productivity
nodes:
  start:
    class_type: StartNode
    inputs: {}
    meta:
      name: ''
      description: ''
    control:
      next: add_days
  add_days:
    class_type: ToolCallNode
    inputs:
      tool: date_calculator
      params:
        operation: add
        date: ${input.base_date}
        days: ${input.days}
        format: '%Y-%m-%d'
      output: shifted
    meta:
      name: 加天数
      description: ''
    control:
      next: end
  end:
    class_type: EndNode
    inputs: {}
    meta:
      name: ''
      description: ''
      end_output:
        shifted: ${shifted}
    control: {}
control:
  start: start
  end: end
  edges: []
  timeout_sec: 3600
  max_retries: 3
  tags:
  - productivity
