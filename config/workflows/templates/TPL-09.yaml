# 演示：JSON 解析后规则评估（链式 tool_call）
workflow:
  id: TPL-09
  name: JSON 与规则链式
  version: "1.0"
  description: 先解析 JSON，再将 data 字段交给 rule_matcher，演示变量模板解析。
  category: analytics

  inputs:
    - name: json_text
      type: string
      description: 待解析的 JSON 文本
      required: false
      default: '{"status":"ok","tier":"demo"}'

  outputs:
    - name: rules_result
      type: object
      description: 规则评估结果

  nodes:
    - id: start
      type: start
      next: parse

    - id: parse
      type: tool_call
      name: 解析 JSON
      tool: json_parser
      params:
        operation: parse
        text: "{{input.json_text}}"
      output: jp_out
      next: rules

    - id: rules
      type: tool_call
      name: 规则评估
      tool: rule_matcher
      params:
        operation: evaluate
        data: "{{jp_out.data}}"
        rules:
          - id: status_ok
            field: status
            operator: eq
            value: ok
      output: rules_result
      next: end

    - id: end
      type: end
      output:
        rules_result: "{{rules_result}}"
