<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <!-- Void preset (light mode) — matches sidebar LogoStage backdrop -->
    <linearGradient id="bgMain" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#B1BAE7"/>
      <stop offset="50%" stop-color="#B8D3EA"/>
      <stop offset="100%" stop-color="#DBC3EA"/>
    </linearGradient>
    <!-- Bottom warm glow -->
    <radialGradient id="glowBottom" cx="50%" cy="115%" rx="40%" ry="29%">
      <stop offset="0%" stop-color="#B0D8EE" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#B0D8EE" stop-opacity="0"/>
    </radialGradient>
    <!-- Top-left subtle purple accent -->
    <radialGradient id="glowTopLeft" cx="6%" cy="6%" rx="30%" ry="30%">
      <stop offset="0%" stop-color="#D5C0E8" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#D5C0E8" stop-opacity="0"/>
    </radialGradient>
    <!-- White mark: subtle opacity gradient like brand/logo.svg -->
    <linearGradient id="markFill" x1="22%" y1="88%" x2="78%" y2="12%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="58%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.62"/>
    </linearGradient>
    <clipPath id="roundClip">
      <rect width="1024" height="1024" rx="228" ry="228"/>
    </clipPath>
  </defs>

  <!-- Background: rounded superellipse -->
  <rect width="1024" height="1024" rx="228" ry="228" fill="url(#bgMain)"/>
  <rect width="1024" height="1024" rx="228" ry="228" fill="url(#glowBottom)"/>
  <rect width="1024" height="1024" rx="228" ry="228" fill="url(#glowTopLeft)"/>

  <!-- Subtle ring -->
  <rect x="1.5" y="1.5" width="1021" height="1021" rx="227" ry="227"
        fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5"/>

  <!-- White LeAgent mark — centered -->
