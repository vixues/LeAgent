# =============================================================================
# LeAgent — single-container stack (SQLite only, no Redis / Milvus / Postgres)
# Matches standalone settings in backend/leagent/config/settings.py.
# Data: set LEAGENT_HOME=/app/data (default below) so DB + working dirs live on the volume.
# =============================================================================
# Usage (from repo root or this directory):
#   docker compose -f deploy/docker-compose.yml up -d --build
#   docker compose -f deploy/docker-compose.yml logs -f leagent
# =============================================================================

name: leagent

services:
  leagent:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: ${BUILD_TARGET:-production}
    image: leagent:${LEAGENT_VERSION:-latest}
    container_name: leagent-backend
    restart: unless-stopped
    environment:
      LEAGENT_HOME: /app/data
      LEAGENT_PORT: "8000"
      LEAGENT_HOST: 0.0.0.0
      LEAGENT_WORKERS: ${LEAGENT_WORKERS:-1}
      LEAGENT_DEBUG: "false"
      LEAGENT_LOG_LEVEL: ${LEAGENT_LOG_LEVEL:-INFO}
      LEAGENT_ENVIRONMENT: production
      FILES_UPLOAD_DIR: /app/uploads
      LEAGENT_SECRET_KEY: ${LEAGENT_SECRET_KEY:?Set LEAGENT_SECRET_KEY in .env (openssl rand -hex 32)}
      LEAGENT_FILES__SIGNED_URL_SECRET: ${LEAGENT_SECRET_KEY}
      LEAGENT_LLM__DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      LEAGENT_LLM__OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LEAGENT_LLM__ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LEAGENT_LLM__VLLM_ENDPOINT: ${VLLM_ENDPOINT:-}
      LEAGENT_LLM__VLLM_MODEL: ${VLLM_MODEL:-}
      LEAGENT_LLM__VLLM_API_KEY: ${VLLM_API_KEY:-}
      LEAGENT_LLM__VLLM_TIMEOUT: ${VLLM_TIMEOUT:-120}
      LEAGENT_LLM__VLLM_ENABLE_AUTO_TOOL_CHOICE: ${VLLM_ENABLE_AUTO_TOOL_CHOICE:-false}
    ports:
      - "${LEAGENT_HOST_PORT:-8000}:8000"
    volumes:
      - leagent-data:/app/data
      - leagent-uploads:/app/uploads
      - leagent-logs:/app/logs
      - leagent-cache:/app/cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

volumes:
  leagent-data:
    driver: local
  leagent-uploads:
    driver: local
  leagent-logs:
    driver: local
  leagent-cache:
    driver: local
