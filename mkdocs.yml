site_name: LeAgent Documentation
site_url: https://vixues.github.io/LeAgent
site_description: Enterprise-Grade Intelligent Office Automation Platform
site_author: LeAgent Team

repo_name: vixues/LeAgent
repo_url: https://github.com/vixues/LeAgent
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang:
        - zh
        - en
  - git-revision-date-localized:
      enable_creation_date: true
      type: datetime
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/vixues/LeAgent
  generator: false
  analytics:
    provider: google
    property: G-XXXXXXXXXX

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Configuration: getting-started/configuration.md
  - Tutorial:
    - Overview: tutorial.md
    - Chat Interface: tutorial/chat.md
    - Workflow Builder: tutorial/workflow.md
    - Tools: tutorial/tools.md
    - Rules: tutorial/rules.md
  - User Guide:
    - Agent: guide/agent.md
    - Tools Reference: guide/tools.md
    - Skills: guide/skills.md
    - Workflow Nodes: guide/workflow-nodes.md
    - Rule Types: guide/rule-types.md
    - Channels: guide/channels.md
    - Accounts, RBAC & Workspaces: guide/accounts.md
    - API: guide/api.md
  - Developer Guide:
    - Architecture: dev/architecture.md
    - Adding Tools: dev/adding-tools.md
    - Adding Channels: dev/adding-channels.md
    - Testing: dev/testing.md
    - Contributing: CONTRIBUTING.md
  - Deployment:
    - Docker: deployment/docker.md
    - Kubernetes: deployment/kubernetes.md
    - Security: deployment/security.md
    - Monitoring: deployment/monitoring.md
  - API Reference:
    - REST API: api/rest.md
    - WebSocket: api/websocket.md
    - SDK: api/sdk.md
  - Changelog: CHANGELOG.md
